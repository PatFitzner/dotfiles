# Host-specific facts consumed by *.tmpl files.
# Add a new host = add a key under `hosts:` whose name matches `hostname`.
# Unknown hosts get the values from `defaults:` below.

defaults:
  gpu: none
  monitors:
    - { port: "", mode: "preferred", position: "auto", scale: 1.00 }
  packages_extra: []
  autostart: []
  systemd_user_enable: []
  tmux_main_windows: []

hosts:
  omarchy:
    gpu: nvidia
    # Internal panel on this ASUS is eDP-2 (not eDP-1). External is HDMI-A-1.
    # Catch-all (empty port) covers any other monitor attached later.
    monitors:
      - { port: eDP-2,    mode: "2560x1600@240", position: "auto",   scale: 1.25 }
      - { port: HDMI-A-1, mode: "2560x1440@240", position: "1600x0", scale: 1.00 }
      - { port: "",       mode: "preferred",     position: "auto",   scale: 1.00 }
    packages_extra:
