  pat-ws:
    gpu: none
    monitors:
      - { port: eDP-1, mode: "1920x1080@60.02", position: "1920x0", scale: 1.25 }
      - { port: DP-1,  mode: "1920x1080@60.00", position: "0x0",    scale: 1.00 }
    packages_extra:
      - baobab
      - gemini-cli
      - google-cloud-cli-gsutil
